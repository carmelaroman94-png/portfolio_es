<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sand:   #E3D6C8;
  --sage:   #8D957E;
  --slate:  #788990;
  --forest: #2E3628;
  --cream:  #F7F4F0;
  --white:  #FFFFFF;
  --text-1: #1E2418;
  --text-2: #4A5240;
  --text-3: #7A8570;
  --border: #D6C9B8;
}
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: "Inter","Segoe UI",sans-serif;
  margin: 0;
  background: var(--cream);
  color: var(--text-1);
}
.db-header {
  background: var(--forest);
  color: var(--sand);
  padding: 28px 40px 22px;
  border-bottom: 3px solid var(--sage);
}
.db-header-eyebrow {
  font-family: "JetBrains Mono",monospace;
  font-size: 0.63rem;
  color: var(--sage);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 7px;
}
.db-header h1 {
  font-size: 1.45rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin: 0 0 5px;
  color: var(--sand);
  border: none !important;
  padding: 0 !important;
}
.db-header-sub {
  font-size: 0.78rem;
  color: rgba(227,214,200,0.45);
  font-family: "JetBrains Mono",monospace;
}
.db-content {
  padding: 32px 40px;
  max-width: 1400px;
  margin: 0 auto;
}
h1 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-1);
  border-bottom: 2px solid var(--sage) !important;
  padding-bottom: 10px !important;
  margin: 40px 0 18px;
}
h2 {
  font-size: 0.98rem;
  font-weight: 700;
  color: var(--text-1);
  margin: 46px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
p { font-size: 0.87rem; color: var(--text-2); line-height: 1.72; margin-bottom: 10px; }
ul, ol { font-size: 0.84rem; color: var(--text-2); line-height: 1.82; padding-left: 20px; }
li { margin-bottom: 3px; }
.section { margin-bottom: 46px; }
.card {
  background: var(--white);
  padding: 22px;
  border-radius: 12px;
  box-shadow: 0 2px 10px rgba(46,54,40,0.06);
  border: 1px solid var(--border);
  margin-bottom: 18px;
}
.card-general {
  background: #EDE8DF;
  border-left: 4px solid var(--sage);
  border-radius: 0 12px 12px 0;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  font-size: 0.81rem;
  background: var(--white);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
th {
  background: var(--forest);
  color: var(--sand);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.77rem;
}
td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-1);
  text-align: center;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #F2EDE5; }
.note { margin-top: 10px; font-size: 0.76rem; color: var(--text-3); font-style: italic; }
</style>
</head>
